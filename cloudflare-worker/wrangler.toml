name = "portfolio-contact"
main = "worker.ts"
compatibility_date = "2024-01-01"

# After deploying, set your secrets:
#   wrangler secret put RESEND_API_KEY
#   wrangler secret put TURNSTILE_SECRET_KEY

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "898ccbfd2a1c4018b1bf4880ff7b2dfa"

# Smart Placement — positions the Worker closer to backend services
# (Resend API, Workers AI) instead of the nearest edge to the visitor.
[placement]
mode = "smart"

# Workers AI — used by the /ask "Ask Thomas" chatbot, STT, and TTS endpoints.
[ai]
binding = "AI"

# Vectorize — semantic knowledge base for the "Ask Thomas" chatbot RAG pipeline.
# Optional: the chatbot works without it. To enable:
#   1. wrangler vectorize create portfolio-knowledge --dimensions 768 --metric cosine
#   2. Uncomment the binding below
#   3. CF_ACCOUNT_ID=xxx CF_API_TOKEN=xxx bun run scripts/seed-vectorize.ts
# [[vectorize]]
# binding = "VECTORIZE"
# index_name = "portfolio-knowledge"
