<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thomas-TP's Professional Page</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900">
    <div class="container mx-auto p-4">
        <div class="flex justify-end">
            <select id="languageSelect" class="bg-white border border-gray-300 rounded-md p-2">
                <option value="en">English</option>
                <option value="fr">Français</option>
            </select>
        </div>
        <h1 id="welcome" class="text-4xl font-bold mt-4">Welcome to Thomas-TP's Professional Page</h1>
        <p id="description" class="mt-2">This is a professional GitHub Page showcasing my projects and achievements.</p>
    </div>

    <script>
        const languageSelect = document.getElementById('languageSelect');
        const welcomeText = {
            en: "Welcome to Thomas-TP's Professional Page",
            fr: "Bienvenue sur la page professionnelle de Thomas-TP"
        };
        const descriptionText = {
            en: "This is a professional GitHub Page showcasing my projects and achievements.",
            fr: "Ceci est une page professionnelle GitHub présentant mes projets et réalisations."
        };

        languageSelect.addEventListener('change', (event) => {
            const language = event.target.value;
            document.getElementById('welcome').textContent = welcomeText[language];
            document.getElementById('description').textContent = descriptionText[language];
        });
    </script>
</body>
</html>
