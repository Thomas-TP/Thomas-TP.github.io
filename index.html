    <!-- Google Fonts: Inter — load async, never block rendering -->

    <!-- Anti-FOUC: apply theme class before render + force scroll to top on every load -->
    <script>
      (function(){try{var s=localStorage.getItem('vite-ui-theme');var t=s==='dark'||s==='light'?s:(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.classList.add(t);}catch(e){}})()
      if('scrollRestoration' in history) history.scrollRestoration='manual';
      window.scrollTo(0,0);
    </script>
